---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: data-ingest
data:
  NODE_ENV: "production"
  PORT: "3000"
  PRODUCER_URL: "http://producer.data-ingest.svc.cluster.local:3001"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: data-ingest
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: data-ingest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: data-ingest-frontend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: frontend-config
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

---
# Expose the frontend via an Ingress (update host as needed)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: data-ingest
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: data-ingest.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
